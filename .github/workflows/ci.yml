name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - run: pnpm build
      - run: pnpm test

  deploy:
    needs: [ build ]
    runs-on: self-hosted
    steps:
      - name: Deploy
        run: bash /home/anthony/sideProjects/wordfetti/scripts/deploy.sh
